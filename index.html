<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roy No Rules... | Premium Shayari & Motivation</title>

    <!-- Preconnect to high priority asset CDNs for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload Primary font definitions only with swap display -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" as="style" />
    <!-- Render-blocking Fonts Optimization (Requirement 1: Load fonts asynchronously with display=swap fallback) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" />
    </noscript>

    <!-- Inline Critical CSS targeting body background to prevent FOUC / Content Shifts -->
    <style>
      body {
        background-color: #030303;
        color: #f4f4f5;
        font-family: 'Outfit', system-ui, -apple-system, sans-serif;
        margin: 0;
      }
      /* Fast visual loader during core application compilation and script fetching */
      #root:empty::before {
        content: "";
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 32px;
        height: 32px;
        border: 2.5px solid #18181b;
        border-top-color: #ef4444;
        border-radius: 50%;
        animation: loading-spin 0.8s linear infinite;
      }
      @keyframes loading-spin {
        to { transform: translate(-50%, -50%) rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
